<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qlik Cloud Embedding Test</title>

  <!-- Qlik Embed: carica la libreria dal tuo tenant -->
  <script
    crossorigin="anonymous"
    type="application/javascript"
    src="https://TUO-TENANT.eu.qlikcloud.com/resources/assets/external/requirejs/require.js"
  ></script>

  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
    .qlik-container {
      width: 100%;
      height: 500px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: white;
      margin-bottom: 2rem;
    }
    qlik-embed {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <h1>Test Qlik Cloud Embedding</h1>

  <!-- Web Component nativo Qlik Embed -->
  <div class="qlik-container">
    <qlik-embed
      ui="analytics/chart"
      app-id="IL-TUO-APP-ID"
      object-id="IL-TUO-OBJECT-ID"
    ></qlik-embed>
  </div>

  <!-- Secondo oggetto (es. un filtro) -->
  <div class="qlik-container" style="height: 120px;">
    <qlik-embed
      ui="analytics/selections"
      app-id="IL-TUO-APP-ID"
    ></qlik-embed>
  </div>

  <script type="module">
    // Configurazione tenant e Web Integration ID
    const config = {
      host: "TUO-TENANT.eu.qlikcloud.com",      // ← il tuo tenant
      clientId: "IL-TUO-WEB-INTEGRATION-ID",    // ← da Management Console
      redirectUri: window.location.href,
      accessTokenStorage: "session",
      autoRedirect: true,
    };

    // Carica il modulo qlik-embed
    const { default: connect } = await import(
      `https://${config.host}/resources/assets/external/qlik-embed-web-components.esm.min.js`
    );

    await connect(config);
  </script>

</body>
</html>
