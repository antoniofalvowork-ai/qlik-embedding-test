<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qlik Cloud Embedding Test</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
    h1 { color: #333; }
    .qlik-container {
      width: 100%;
      height: 500px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: white;
      margin-bottom: 2rem;
    }
    .qlik-sel {
      width: 100%;
      height: 80px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    qlik-embed { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>

  <h1>Qlik Cloud — Test Embedding</h1>

  <!-- Barra selezioni -->
  <div class="qlik-sel">
    <qlik-embed
      ui="analytics/selections"
      app-id="602d6081-7475-4dc9-ad73-255807119025">
    </qlik-embed>
  </div>

  <!-- Oggetto / grafico -->
  <div class="qlik-container">
    <qlik-embed
      ui="analytics/chart"
      app-id="602d6081-7475-4dc9-ad73-255807119025"
      object-id="jvx">
    </qlik-embed>
  </div>

  <script type="module">
    const TENANT   = "2ckhrzb1n5yorxb.eu.qlikcloud.com";
    const WEB_ID   = "cmZm1K7PPpAp92xb4HPnuMfvC_WOCN5o";
    const REDIRECT = "https://antoniofalvowork-ai.github.io/qlik-embedding-test/";

    const { default: connect } = await import(
      `https://${TENANT}/resources/assets/external/qlik-embed-web-components.esm.min.js`
    );

    await connect({
      host: TENANT,
      clientId: WEB_ID,
      redirectUri: REDIRECT,
      accessTokenStorage: "session",
      autoRedirect: true,
    });
  </script>

</body>
</html>
